```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Price Chart</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* LOGIN */

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

.login input{
padding:12px;
border:none;
border-radius:6px;
margin:10px;
width:220px;
}

.login button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* HEADER */

.header{
background:#111827;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

/* CONTAINER */

.container{
width:90%;
max-width:1100px;
margin:auto;
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* INPUTS */

.inputs{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.inputs input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.addBtn{
background:#2563eb;
color:white;
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* SEARCH */

.search{
width:60%;
display:block;
margin:auto;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
margin-bottom:20px;
}

/* DASHBOARD */

.dashboard{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:15px;
}

.card{
background:#f3f4f6;
padding:12px 20px;
border-radius:8px;
font-weight:bold;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

tr:hover{
background:#f9fafb;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.editBtn{
background:orange;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="login" id="loginPage">
<h2>Price Chart</h2>
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<div id="mainPage" style="display:none">

<div class="header">Price Chart Dashboard</div>

<div class="container">

<div class="inputs">

<input type="text" id="productName" placeholder="Product Name">

<select id="type" onchange="changeType()">
<option value="Kg">Kg</option>
<option value="Piece">Piece</option>
</select>

<select id="weight">
<option value="50g">50g</option>
<option value="100g">100g</option>
<option value="250g">250g</option>
<option value="500g">500g</option>
<option value="1Kg">1Kg</option>
</select>

<input type="number" id="quantity" placeholder="Quantity">

<input type="number" id="receivedPrice" placeholder="Buy Price">

<input type="number" id="sellingPrice" placeholder="Sell Price">

<button class="addBtn" onclick="addProduct()">Add Product</button>

</div>

<input class="search" id="searchBox" placeholder="Search Product" onkeyup="searchProduct()">

<div class="dashboard">
<div class="card">Total Products: <span id="totalProducts">0</span></div>
</div>

<table id="productTable">

<tr>
<th>Product</th>
<th>Qty</th>
<th>Type</th>
<th>Weight</th>
<th>Buy</th>
<th>Sell</th>
<th>Edit</th>
<th>Delete</th>
</tr>

</table>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyB3SM58_y0Wg9F28fGfJXMWAxqYWjTqxCk",
authDomain: "price-chart-b76db.firebaseapp.com",
projectId: "price-chart-b76db",
storageBucket: "price-chart-b76db.firebasestorage.app",
messagingSenderId: "841508743234",
appId: "1:841508743234:web:9ff6d8cb3112d11f4565db"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.login=function(){
let pass=document.getElementById("password").value;
if(pass==="1234"){
document.getElementById("loginPage").style.display="none";
document.getElementById("mainPage").style.display="block";
loadProducts();
}else{
alert("Wrong Password");
}
}


window.changeType=function(){
let type=document.getElementById("type").value;
document.getElementById("weight").style.display=(type==="Kg")?"block":"none";
}


window.addProduct=async function(){

let name=document.getElementById("productName").value;
let quantity=parseFloat(document.getElementById("quantity").value)||0;
let type=document.getElementById("type").value;
let weight=document.getElementById("weight").value;
let received=parseFloat(document.getElementById("receivedPrice").value)||0;
let selling=parseFloat(document.getElementById("sellingPrice").value)||0;

await addDoc(collection(db,"products"),{
name,
quantity,
type,
weight,
received,
selling
});

document.getElementById("productName").value="";
document.getElementById("quantity").value="";
document.getElementById("receivedPrice").value="";
document.getElementById("sellingPrice").value="";

loadProducts();
}


window.deleteProduct=async function(id){
await deleteDoc(doc(db,"products",id));
loadProducts();
}


window.editProduct=async function(id,data){

let newName=prompt("Edit Product Name",data.name);
if(newName===null) return;

let newQty=prompt("Edit Quantity",data.quantity);
if(newQty===null) return;

let newType=prompt("Type (Kg/Piece)",data.type);
if(newType===null) return;

let newWeight=prompt("Weight (50g,100g...)",data.weight);
if(newWeight===null) return;

let newBuy=prompt("Buy Price",data.received);
if(newBuy===null) return;

let newSell=prompt("Sell Price",data.selling);
if(newSell===null) return;

await updateDoc(doc(db,"products",id),{
name:newName,
quantity:parseFloat(newQty),
type:newType,
weight:newWeight,
received:parseFloat(newBuy),
selling:parseFloat(newSell)
});

loadProducts();
}


async function loadProducts(){

let querySnapshot=await getDocs(collection(db,"products"));

let table=document.getElementById("productTable");

table.innerHTML=`<tr>
<th>Product</th>
<th>Qty</th>
<th>Type</th>
<th>Weight</th>
<th>Buy</th>
<th>Sell</th>
<th>Edit</th>
<th>Delete</th>
</tr>`;

let totalProducts=0;

querySnapshot.forEach((docu)=>{

let d=docu.data();

totalProducts++;

let row=`<tr>
<td>${d.name}</td>
<td>${d.quantity}</td>
<td>${d.type}</td>
<td>${d.weight || "-"}</td>
<td>₹ ${d.received}</td>
<td>₹ ${d.selling}</td>
<td><button class="editBtn" onclick='editProduct("${docu.id}",${JSON.stringify(d)})'>Edit</button></td>
<td><button class="deleteBtn" onclick='deleteProduct("${docu.id}")'>Delete</button></td>
</tr>`;

table.innerHTML+=row;

});

document.getElementById("totalProducts").innerText=totalProducts;

}


window.searchProduct=function(){

let input=document.getElementById("searchBox").value.toLowerCase();

let rows=document.querySelectorAll("#productTable tr");

rows.forEach((row,index)=>{

if(index==0)return;

let text=row.innerText.toLowerCase();

row.style.display=text.includes(input)?"":"none";

});

}

</script>

</body>
</html>
